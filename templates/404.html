{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="container" style="text-align:center;padding:var(--space-xl) var(--space-lg)">
  <h1 style="font-size:4rem;margin-bottom:var(--space-md);color:var(--text-muted)">404</h1>
  <h2 style="margin-bottom:var(--space-md)">Page Not Found</h2>
  <p style="margin-bottom:var(--space-lg);max-width:480px;margin-left:auto;margin-right:auto">
    The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
  </p>
  <a href="/" class="btn btn-primary">Go to Dashboard</a>
</div>
{% endblock %}
